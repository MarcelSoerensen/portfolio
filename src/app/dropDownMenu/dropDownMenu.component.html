<div class="dropdown">
  <div class="dropdown__logo-bg">
    <app-profile-logo
      [logoSrc]="'assets/icons/logo_vector.svg'"
      [light]="true"
    ></app-profile-logo>
  </div>
  <button
    class="dropdown__menu-btn"
    aria-label="Menü"
    (click)="toggleMenu()"
    [class.dropdown__menu-btn--active]="menuOpen"
  >
    <img class="dropdown__menu-icon" [src]="menuIconSrc" alt="Menü Symbol" />
  </button>

  <div
    *ngIf="menuOpen"
    class="dropdown__bg"
    [class.dropdown__bg--fade-out]="isFadingOut"
    (click)="closeMenu()"
  >
    <img
      class="dropdown__bg-img"
      src="/assets/backgrounds/mobile/bg_ellipse_mobile.png"
      alt="Dropdown Hintergrund"
    />
    <div class="dropdown__nav" (click)="$event.stopPropagation()">
      <app-navigation
        [column]="true"
        (linkClicked)="onNavLinkClicked()"
      ></app-navigation>
      <app-language-toggle
        [selectedLanguage]="selectedLanguage"
        [setLanguage]="setLanguage.bind(this)"
        [small]="true"
      ></app-language-toggle>
    </div>
  </div>
</div>
